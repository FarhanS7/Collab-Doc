<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Y.js + Tiptap + Socket.io Collaboration Spike</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #090d16;
      --panel-dark: #121824;
      --border-color: #1e293b;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --primary: #6366f1;
      --primary-glow: rgba(99, 102, 241, 0.15);
      --success: #10b981;
      --warning: #f59e0b;
      --font-display: 'Outfit', sans-serif;
      --font-body: 'Plus Jakarta Sans', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text-main);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    header {
      padding: 1.5rem 2rem;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: linear-gradient(180deg, rgba(18, 24, 36, 0.5) 0%, rgba(9, 13, 22, 0) 100%);
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .logo-icon {
      width: 2.25rem;
      height: 2.25rem;
      background: linear-gradient(135deg, #818cf8 0%, #6366f1 100%);
      border-radius: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: white;
      font-family: var(--font-display);
      box-shadow: 0 0 15px var(--primary-glow);
    }

    h1 {
      font-family: var(--font-display);
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: -0.025em;
    }

    .badge {
      background-color: rgba(99, 102, 241, 0.1);
      border: 1px solid rgba(99, 102, 241, 0.2);
      color: #a5b4fc;
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }

    .badge-dot {
      width: 0.5rem;
      height: 0.5rem;
      background-color: var(--success);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--success);
    }

    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      padding: 2rem;
      max-width: 1600px;
      margin: 0 auto;
      width: 100%;
    }

    @media (max-width: 1024px) {
      main {
        grid-template-columns: 1fr;
      }
    }

    .editor-wrapper {
      background-color: var(--panel-dark);
      border: 1px solid var(--border-color);
      border-radius: 1rem;
      display: flex;
      flex-direction: column;
      height: calc(100vh - 180px);
      min-height: 500px;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4);
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
      overflow: hidden;
    }

    .editor-wrapper:focus-within {
      border-color: var(--primary);
      box-shadow: 0 4px 30px rgba(99, 102, 241, 0.1);
    }

    .editor-header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: rgba(9, 13, 22, 0.3);
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .user-avatar {
      width: 2rem;
      height: 2rem;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.85rem;
      color: white;
    }

    .avatar-a {
      background: linear-gradient(135deg, #ec4899 0%, #be185d 100%);
      box-shadow: 0 0 10px rgba(236, 72, 153, 0.3);
    }

    .avatar-b {
      background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
      box-shadow: 0 0 10px rgba(6, 182, 212, 0.3);
    }

    .user-title {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 0.95rem;
    }

    .sync-status {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .status-dot {
      width: 0.4rem;
      height: 0.4rem;
      border-radius: 50%;
      background-color: var(--text-muted);
    }

    .status-dot.connected {
      background-color: var(--success);
      box-shadow: 0 0 6px var(--success);
    }

    /* Tiptap Editor Styling */
    .editor-container {
      flex: 1;
      padding: 1.5rem;
      overflow-y: auto;
      outline: none;
    }

    .ProseMirror {
      outline: none;
      min-height: 100%;
      font-size: 0.95rem;
      line-height: 1.7;
      color: #e2e8f0;
    }

    .ProseMirror p {
      margin-bottom: 1rem;
    }

    .ProseMirror h1, .ProseMirror h2, .ProseMirror h3 {
      font-family: var(--font-display);
      font-weight: 700;
      color: var(--text-main);
      margin-top: 1.5rem;
      margin-bottom: 1rem;
    }

    .ProseMirror h1 { font-size: 1.75rem; }
    .ProseMirror h2 { font-size: 1.4rem; }
    .ProseMirror h3 { font-size: 1.15rem; }

    .ProseMirror blockquote {
      border-left: 4px solid var(--primary);
      padding-left: 1rem;
      color: var(--text-muted);
      font-style: italic;
      margin: 1.5rem 0;
    }

    .ProseMirror code {
      background-color: rgba(255, 255, 255, 0.07);
      padding: 0.2rem 0.4rem;
      border-radius: 0.25rem;
      font-family: monospace;
      font-size: 0.85em;
    }

    /* Collab cursors styling */
    .collaboration-cursor__caret {
      position: relative;
      margin-left: -1px;
      margin-right: -1px;
      border-left: 2px solid;
      border-right: 2px solid;
      border-color: currentColor;
      word-break: normal;
      pointer-events: none;
    }

    .collaboration-cursor__label {
      position: absolute;
      top: -1.4em;
      left: -2px;
      font-size: 0.7rem;
      font-weight: 600;
      line-height: normal;
      user-select: none;
      color: #fff;
      padding: 0.1rem 0.3rem;
      border-radius: 3px 3px 3px 0;
      white-space: nowrap;
      pointer-events: none;
    }

    /* Simple custom toolbar */
    .editor-toolbar {
      padding: 0.5rem 1rem;
      border-bottom: 1px solid var(--border-color);
      background-color: rgba(18, 24, 36, 0.2);
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .toolbar-btn {
      background: transparent;
      border: 1px solid transparent;
      color: var(--text-muted);
      padding: 0.35rem 0.6rem;
      border-radius: 0.375rem;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 500;
      transition: all 0.2s ease;
    }

    .toolbar-btn:hover {
      background-color: rgba(255, 255, 255, 0.05);
      color: var(--text-main);
    }

    .toolbar-btn.is-active {
      background-color: rgba(99, 102, 241, 0.15);
      border-color: rgba(99, 102, 241, 0.3);
      color: #a5b4fc;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo-container">
      <div class="logo-icon">C</div>
      <h1>CollabEditor Spike</h1>
    </div>
    <div class="badge">
      <div class="badge-dot"></div>
      Real-Time Sync Spike (E.1)
    </div>
  </header>

  <main>
    <!-- Editor Instance A (Pink) -->
    <div class="editor-wrapper" id="editor-wrapper-a">
      <div class="editor-header">
        <div class="user-info">
          <div class="user-avatar avatar-a">A</div>
          <div>
            <div class="user-title">User A (Tab Simulator 1)</div>
            <div class="sync-status">
              <div class="status-dot connected" id="dot-a"></div>
              <span>Socket Connected</span>
            </div>
          </div>
        </div>
      </div>
      <div class="editor-toolbar" id="toolbar-a">
        <button class="toolbar-btn" data-action="bold">Bold</button>
        <button class="toolbar-btn" data-action="italic">Italic</button>
        <button class="toolbar-btn" data-action="heading1">H1</button>
        <button class="toolbar-btn" data-action="heading2">H2</button>
        <button class="toolbar-btn" data-action="blockquote">Quote</button>
      </div>
      <div class="editor-container" id="editor-a"></div>
    </div>

    <!-- Editor Instance B (Blue) -->
    <div class="editor-wrapper" id="editor-wrapper-b">
      <div class="editor-header">
        <div class="user-info">
          <div class="user-avatar avatar-b">B</div>
          <div>
            <div class="user-title">User B (Tab Simulator 2)</div>
            <div class="sync-status">
              <div class="status-dot connected" id="dot-b"></div>
              <span>Socket Connected</span>
            </div>
          </div>
        </div>
      </div>
      <div class="editor-toolbar" id="toolbar-b">
        <button class="toolbar-btn" data-action="bold">Bold</button>
        <button class="toolbar-btn" data-action="italic">Italic</button>
        <button class="toolbar-btn" data-action="heading1">H1</button>
        <button class="toolbar-btn" data-action="heading2">H2</button>
        <button class="toolbar-btn" data-action="blockquote">Quote</button>
      </div>
      <div class="editor-container" id="editor-b"></div>
    </div>
  </main>

  <script type="module" src="/client.js"></script>
</body>
</html>
